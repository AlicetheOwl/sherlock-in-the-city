<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherlock in the City – Game Master Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#13161b;
  --ink-2:#0b0d11;
  --fog:#1b2027;
  --fog-2:#232a34;
  --line:rgba(205,164,52,0.22);
  --line-soft:rgba(205,164,52,0.12);
  --brass:#cda434;
  --brass-soft:#e3c869;
  --parch:#e9e1cf;
  --parch-2:#ddd3bc;
  --parch-ink:#2a2520;
  --parch-muted:#6b5f48;
  --bone:#e7ddc7;
  --oxblood:#bb4543;
  --oxblood-deep:#7e2c2b;
  --steel:#9aa3ad;
  --text:#d8d2c4;
  --muted:#8f897a;
  --dead:#5a5750;
  --safe:#6fae7a;
  --display:'Cinzel',Georgia,serif;
  --body:'EB Garamond',Georgia,serif;
  --type:'Special Elite','Courier New',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body);
  color:var(--text);
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(205,164,52,0.10), transparent 60%),
    radial-gradient(100% 100% at 50% 120%, rgba(0,0,0,0.55), transparent 70%),
    var(--ink);
  background-attachment:fixed;
  min-height:100vh;
  line-height:1.55;
  font-size:18px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1120px;margin:0 auto;padding:32px 22px 80px}
a{color:var(--brass-soft)}

/* ---------- type ---------- */
.eyebrow{font-family:var(--type);font-size:12px;letter-spacing:0.32em;text-transform:uppercase;color:var(--brass);opacity:.85}
h1.title{font-family:var(--display);font-weight:700;font-size:clamp(34px,6vw,62px);line-height:1.02;margin:.18em 0 .12em;color:var(--bone);letter-spacing:.01em}
.subtitle{font-family:var(--type);font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
h2.sec{font-family:var(--display);font-size:22px;color:var(--brass-soft);letter-spacing:.04em;margin:0 0 2px}
.lede{color:var(--muted);max-width:62ch;margin:10px 0 0;font-size:17px}

/* ---------- masthead ---------- */
.masthead{border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:30px;position:relative}
.masthead::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--brass),transparent);opacity:.5}
.crest{font-family:var(--type);font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase}

/* ---------- setup ---------- */
.dossier-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:8px}
.dossier{
  background:var(--fog);
  border:1px solid var(--line-soft);
  border-radius:3px;
  padding:18px 18px 10px;
}
.dossier-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line-soft);padding-bottom:10px;margin-bottom:12px}
.faction-name{font-family:var(--display);font-size:18px;letter-spacing:.05em}
.faction-name.civilian{color:var(--bone)}
.faction-name.gang{color:var(--oxblood)}
.faction-name.solo{color:var(--steel)}
.faction-tally{font-family:var(--type);font-size:11px;color:var(--muted);letter-spacing:.12em}
.assign-row{display:flex;align-items:center;gap:10px;padding:7px 0}
.assign-role{font-family:var(--body);font-size:17px;width:43%;min-width:120px;display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(0,0,0,.4)}
.dot.civilian{background:var(--bone)}
.dot.gang{background:var(--oxblood)}
.dot.solo{background:var(--steel)}
input[type=text]{
  flex:1;background:var(--ink-2);border:1px solid var(--line-soft);
  color:var(--text);font-family:var(--type);font-size:14px;
  padding:8px 10px;border-radius:2px;letter-spacing:.02em;min-width:0;
}
input[type=text]::placeholder{color:#5d574b;letter-spacing:.06em}
input[type=text]:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 1px var(--brass)}

.setup-foot{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;margin-top:28px;border-top:1px solid var(--line);padding-top:22px}
.count-note{font-family:var(--type);font-size:13px;color:var(--muted);letter-spacing:.08em}
.count-note b{color:var(--brass-soft)}
.warn{color:var(--oxblood);font-family:var(--type);font-size:13px;letter-spacing:.06em;margin-top:8px;display:none}

/* entry: method chooser */
.method-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:18px}
.method-card{display:flex;flex-direction:column;align-items:flex-start;gap:8px;text-align:left;background:var(--fog);border:1px solid var(--line-soft);border-radius:3px;padding:26px 24px;cursor:pointer;color:var(--text);font-family:var(--body);transition:border-color .15s,transform .15s}
.method-card:hover{border-color:var(--brass);transform:translateY(-2px)}
.method-ic{font-size:34px;line-height:1}
.method-name{font-family:var(--display);font-size:24px;color:var(--brass-soft);letter-spacing:.03em}
.method-desc{font-size:15px;color:var(--muted);line-height:1.4}
/* random: role checkboxes */
.pickrole{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer}
.pickrole input{width:16px;height:16px;accent-color:var(--brass);flex:none}
.pickrole-name{font-family:var(--body);font-size:17px;display:flex;align-items:center;gap:8px}
.pickrole .dot{width:11px;height:11px}
.pickrole.civilian .dot{background:#f2ecdc;box-shadow:0 0 0 1px rgba(0,0,0,.5)}
.pickrole.gang .dot{background:var(--oxblood);box-shadow:0 0 0 1px rgba(0,0,0,.5)}
.pickrole.solo .dot{background:#000;box-shadow:0 0 0 1px var(--steel)}
.pickrole.civilian .pickrole-name{color:#f2ecdc}
.pickrole.gang .pickrole-name{color:#d98785}
.pickrole.solo .pickrole-name{color:var(--steel)}
/* random: dealing step */
.deal-wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:20px;margin-top:18px}
@media(max-width:720px){.deal-wrap{grid-template-columns:1fr}}
.deal-card{background:var(--fog);border:1px solid var(--line-soft);border-radius:3px;padding:22px}
.deal-progress{font-family:var(--type);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.deal-progress b{color:var(--brass-soft);font-size:16px}
.deal-input{width:100%;margin-bottom:6px}
.dealt-list{display:flex;flex-direction:column;gap:2px}
.dealt-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dotted var(--line-soft)}
.dealt-row:last-child{border-bottom:none}
.dealt-no{font-family:var(--type);font-size:11px;color:var(--brass);min-width:20px}
.dealt-name{flex:1;color:var(--bone);font-size:16px}
.dealt-tag{font-family:var(--type);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--safe)}
.evt-mode-tag{display:inline-block;font-family:var(--type);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line-soft);border-radius:2px;padding:4px 8px;margin-right:8px;vertical-align:middle}
.day-event{display:flex;gap:12px;align-items:flex-start;background:rgba(205,164,52,.08);border:1px solid var(--line-soft);border-left:3px solid var(--brass);border-radius:3px;padding:14px 16px;margin-bottom:14px}
.day-event-ic{font-size:20px;line-height:1.2;color:var(--brass-soft);flex:none}
.day-event-body{display:flex;flex-direction:column;gap:3px}
.day-event-title{font-family:var(--display);font-size:19px;color:var(--brass-soft);letter-spacing:.03em}
.day-event-text{font-size:14px;color:var(--text);line-height:1.4}

/* ---------- buttons ---------- */
.btn{
  font-family:var(--type);font-size:14px;letter-spacing:.14em;text-transform:uppercase;
  background:var(--brass);color:#1a1610;border:none;padding:13px 24px;border-radius:2px;
  cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,background .12s;
}
.btn:hover{background:var(--brass-soft);box-shadow:0 6px 22px rgba(205,164,52,.22)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--brass-soft);border:1px solid var(--line)}
.btn.ghost:hover{background:rgba(205,164,52,.08);box-shadow:none}
.btn.danger{background:var(--oxblood)}
.btn.danger:hover{background:#cf5250;box-shadow:0 6px 22px rgba(187,69,67,.25)}
.btn.small{padding:7px 13px;font-size:11px;letter-spacing:.1em}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}
.btn:focus-visible{outline:2px solid var(--brass-soft);outline-offset:2px}

/* ---------- dashboard ---------- */
.phase-banner{
  display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;
  background:linear-gradient(180deg,var(--fog-2),var(--fog));
  border:1px solid var(--line);border-radius:3px;padding:18px 22px;margin-bottom:24px;position:relative;overflow:hidden;
}
.phase-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(70% 120% at 12% 0%,rgba(205,164,52,.14),transparent 60%);pointer-events:none}
.phase-now{display:flex;align-items:center;gap:16px}
.orb{width:46px;height:46px;border-radius:50%;flex:none;position:relative}
.orb.night{background:radial-gradient(circle at 35% 35%,#3a4350,#11151b);box-shadow:inset -6px -6px 12px rgba(0,0,0,.6),0 0 18px rgba(120,140,170,.25)}
.orb.day{background:radial-gradient(circle at 40% 40%,#f2d98a,#cda434);box-shadow:0 0 22px rgba(205,164,52,.45)}
.phase-label{font-family:var(--type);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
.phase-title{font-family:var(--display);font-size:30px;color:var(--bone);line-height:1}

.layout{display:grid;grid-template-columns:1.55fr 1fr;gap:24px;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr}}

.panel{background:var(--fog);border:1px solid var(--line-soft);border-radius:3px;padding:18px 20px}
.panel + .panel{margin-top:22px}
.panel-head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line-soft);padding-bottom:10px;margin-bottom:14px}

/* ledger */
.ledger{font-family:var(--type)}
.ledger-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px dotted var(--line-soft);font-size:14px;letter-spacing:.06em}
.ledger-row:last-child{border-bottom:none}
.ledger-label{color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-size:12px}
.ledger-val{color:var(--bone);font-size:16px}
.ledger-val.alive{color:var(--safe)}
.ledger-val.dead{color:var(--oxblood)}
.ledger-val.off{color:var(--dead)}
.bomb-note{margin-top:12px;font-family:var(--type);font-size:12px;letter-spacing:.06em;color:var(--oxblood);text-transform:uppercase}

/* clue board */
.clueboard{background:var(--ink-2);border:1px solid var(--line);border-radius:3px;padding:18px 20px;margin-top:22px;text-align:center}
.clueboard .eyebrow{display:block;margin-bottom:8px}
.clue-text{font-family:var(--display);color:var(--brass-soft);font-size:clamp(26px,4.6vw,46px);line-height:1.12;word-break:break-word}
.clue-empty{font-family:var(--body);color:var(--dead);font-size:18px;font-style:italic}

/* roster */
.roster{display:flex;flex-direction:column;gap:10px}
.card{
  display:flex;align-items:center;gap:14px;background:var(--fog-2);
  border:1px solid var(--line-soft);border-left:3px solid var(--muted);
  border-radius:2px;padding:11px 14px;transition:opacity .2s;
}
.card.civilian{border-left-color:var(--bone)}
.card.gang{border-left-color:var(--oxblood)}
.card.solo{border-left-color:var(--steel)}
.card.dead{opacity:.5;border-left-color:var(--dead)}
.card-id{flex:1;min-width:0}
.card-player{font-family:var(--type);font-size:16px;color:var(--bone);letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.dead .card-player{text-decoration:line-through;color:var(--dead)}
.card-role{font-size:15px;color:var(--muted)}
.card-state{font-family:var(--type);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--safe);white-space:nowrap}
.card.dead .card-state{color:var(--oxblood)}
.card-tags{display:flex;align-items:center;gap:8px}
.shield{font-family:var(--type);font-size:10px;letter-spacing:.12em;color:#1a1610;background:var(--brass);padding:2px 7px;border-radius:2px;text-transform:uppercase}

/* log */
.log{font-family:var(--type);font-size:13px;letter-spacing:.02em;max-height:320px;overflow:auto}
.log-row{padding:8px 0;border-bottom:1px dotted var(--line-soft);color:var(--text);display:flex;gap:10px}
.log-row:last-child{border-bottom:none}
.log-tag{color:var(--brass);flex:none;min-width:62px;font-size:11px;letter-spacing:.08em}
.log-empty{color:var(--dead);font-style:italic;font-family:var(--body)}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,7,10,.78);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:22px;z-index:50}
.overlay.show{display:flex}
.modal{
  width:min(560px,100%);max-height:88vh;overflow:auto;
  background:var(--parch);color:var(--parch-ink);border-radius:4px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);position:relative;
  border:1px solid #c7bda3;
  animation:rise .26s cubic-bezier(.2,.7,.3,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:none}}
.modal-inner{padding:26px 28px 24px;position:relative}
.stamp{position:absolute;top:14px;right:18px;font-family:var(--type);font-size:11px;letter-spacing:.18em;color:rgba(126,44,43,.5);border:1.5px solid rgba(126,44,43,.4);padding:4px 9px;border-radius:2px;transform:rotate(6deg);text-transform:uppercase}
.step-no{font-family:var(--display);font-size:46px;line-height:1;color:rgba(42,37,32,.18);font-weight:700}
.modal-eyebrow{font-family:var(--type);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--parch-muted);margin-top:6px}
.modal-title{font-family:var(--display);font-size:30px;line-height:1.05;margin:6px 0 4px;color:var(--parch-ink)}
.modal-instr{font-size:17px;color:#4a4338;margin:6px 0 18px;max-width:46ch}
.modal-q{font-size:21px;color:var(--parch-ink);margin:10px 0 22px;font-weight:500}

.picklist{display:flex;flex-direction:column;gap:7px;margin:4px 0 22px;max-height:42vh;overflow:auto;padding-right:2px}
.pick{display:flex;align-items:center;gap:12px;border:1px solid #cabfa6;border-radius:2px;padding:10px 12px;cursor:pointer;background:rgba(255,255,255,.35);transition:background .12s,border-color .12s}
.pick:hover{background:rgba(255,255,255,.7)}
.pick input{accent-color:var(--oxblood-deep);width:16px;height:16px;flex:none}
.pick-name{font-family:var(--type);font-size:16px;color:var(--parch-ink);letter-spacing:.02em;flex:1}
.pick-role{font-size:14px;color:var(--parch-muted)}
.pick.pick-none{background:transparent;border-style:dashed}
.pick.pick-none .pick-name{color:var(--parch-muted);font-style:normal}
.evt-list{max-height:52vh}
.evt-pick{align-items:flex-start}
.evt-pick-main{display:flex;flex-direction:column;gap:3px;flex:1}
.evt-pick-title{font-family:var(--type);font-size:15px;color:var(--parch-ink);letter-spacing:.03em}
.evt-pick-text{font-size:14px;color:var(--parch-muted);line-height:1.32}
.pick:has(input:checked){background:rgba(187,69,67,.12);border-color:var(--oxblood-deep)}

.modal-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.modal .btn{background:var(--oxblood-deep);color:#f3ead7}
.modal .btn:hover{background:var(--oxblood)}
.modal .btn.ghost{background:transparent;color:var(--oxblood-deep);border:1px solid rgba(126,44,43,.4)}
.modal .btn.ghost:hover{background:rgba(126,44,43,.08)}
.modal .btn.confirm{background:#3c5a3f}
.modal .btn.confirm:hover{background:#4d7351}

/* clue input (large) */
.clue-input{
  width:100%;font-family:var(--display);font-size:30px;line-height:1.2;color:var(--parch-ink);
  background:rgba(255,255,255,.5);border:1px solid #cabfa6;border-radius:3px;padding:16px;
  min-height:120px;resize:vertical;margin:6px 0 20px;text-align:center;
}
.clue-input:focus{outline:none;border-color:var(--oxblood-deep);box-shadow:0 0 0 1px var(--oxblood-deep)}

/* reveal box (Lestrade) */
.reveal{border-radius:3px;padding:16px 18px;margin:4px 0 22px;font-size:18px;text-align:center;font-family:var(--body)}
.reveal.hit{background:rgba(111,174,122,.18);border:1px solid #6fae7a;color:#2c4a31}
.reveal.miss{background:rgba(187,69,67,.14);border:1px solid var(--oxblood-deep);color:#6e2625}
.reveal b{font-family:var(--type);letter-spacing:.04em}

/* summary list */
.sum-list{margin:6px 0 22px}
.sum-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dotted #c7bda3;font-size:17px}
.sum-row:last-child{border-bottom:none}
.sum-row .mark{font-family:var(--type);font-size:12px;letter-spacing:.06em;flex:none;min-width:78px;text-transform:uppercase}
.mark.killed{color:var(--oxblood-deep)}
.mark.saved{color:#3c5a3f}
.mark.quiet{color:var(--parch-muted)}

/* end announcement */
.modal.verdict{background:var(--ink-2);color:var(--text);border:1px solid var(--line);text-align:center}
.modal.verdict .modal-inner{padding:44px 32px 36px}
.verdict-eyebrow{font-family:var(--type);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.verdict-title{font-family:var(--display);font-size:clamp(30px,5.5vw,46px);line-height:1.1;margin:14px 0 8px}
.verdict-title.gang{color:var(--oxblood)}
.verdict-title.civ{color:#79d18e}
.verdict-title.terror{color:#ff5a4d}
.verdict-title.solo{color:var(--steel)}
.verdict-sub{color:var(--muted);font-size:17px;margin-bottom:26px}
.modal.verdict .btn{background:var(--brass);color:#1a1610}
.modal.verdict .btn:hover{background:var(--brass-soft)}

/* phase tracker (days & nights) */
.tracker{display:flex;gap:6px;overflow-x:auto;padding:2px 1px 12px;margin-bottom:4px}
.track-chip{flex:none;display:flex;align-items:center;gap:7px;font-family:var(--type);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:7px 11px;border-radius:2px;border:1px solid var(--line-soft);background:var(--fog);color:var(--muted);white-space:nowrap}
.track-chip .ic{font-size:13px;line-height:1}
.track-chip.night .ic{color:#8fa3bd}
.track-chip.day .ic{color:var(--brass)}
.track-chip.past{opacity:.5}
.track-chip.current{opacity:1;color:var(--bone);border-color:var(--brass);background:linear-gradient(180deg,var(--fog-2),var(--fog));box-shadow:0 0 0 1px var(--brass),0 0 16px rgba(205,164,52,.18)}
.track-chip.deadline{border-style:dashed;border-color:var(--oxblood-deep);color:var(--oxblood);opacity:.85}
.track-chip.deadline .ic{color:var(--oxblood)}

/* move history matrix */
.mv-scroll{max-height:360px;overflow:auto}
.grid{border-collapse:collapse;font-family:var(--type);font-size:11px;white-space:nowrap}
.grid th,.grid td{border:1px solid var(--line-soft);padding:5px 8px;text-align:center}
.grid .grid-corner{background:var(--fog);text-align:left;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:10px;font-weight:normal;position:sticky;left:0;z-index:3}
.grid .grid-evrow .grid-corner{color:var(--brass)}
.grid .grid-player{background:var(--fog);text-align:left;color:var(--bone);font-weight:normal;position:sticky;left:0;z-index:2;min-width:118px;white-space:normal}
.grid .grid-role{display:block;color:var(--muted);font-size:9px;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.grid .grid-hdr th{background:var(--fog-2);color:var(--brass);font-weight:normal;letter-spacing:.06em}
.grid .grid-ev{background:rgba(205,164,52,.07);color:var(--brass-soft);font-size:10px;letter-spacing:.02em;max-width:170px;white-space:normal;line-height:1.25}
.grid tr.grid-dead .grid-player{color:var(--dead);text-decoration:line-through}
.grid .mk{font-weight:bold;letter-spacing:.03em}
.grid .mk-none{color:var(--dead)}

/* clue history */

.clue-tag{font-family:var(--type);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);background:var(--brass);border-radius:2px;padding:1px 6px;vertical-align:middle}

/* event reminder callout (on parchment modals) */

/* big clue display (read from afar, on demand) */
.modal.bigclue{background:var(--ink-2);color:var(--bone);border:1px solid var(--line);text-align:center}

.modal.bigclue .btn{background:var(--brass);color:#1a1610}
.modal.bigclue .btn:hover{background:var(--brass-soft)}

@media (prefers-reduced-motion: reduce){
  .modal{animation:none}
  .btn{transition:none}
}
/* console: andon control bar */
.andon-bar{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin:0 0 20px;padding:12px 16px;background:var(--fog);border:1px solid var(--line-soft);border-radius:4px}
.andon-seg{display:flex;align-items:center;gap:6px}
.andon-seg-lbl{font-family:var(--type);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-right:2px}
.seg{font-family:var(--type);font-size:12px;letter-spacing:.04em;padding:6px 12px;border:1px solid var(--line-soft);background:transparent;color:var(--muted);border-radius:3px;cursor:pointer}
.seg:hover{border-color:var(--brass)}
.seg.on{background:var(--brass);color:var(--ink);border-color:var(--brass)}

/* ===== Andon (player screen) ===== */
.andon{max-width:1500px;margin:0 auto;padding:26px 30px;min-height:100vh;display:flex;flex-direction:column;gap:20px}
.andon-wait{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
.andon-crest{font-family:var(--type);letter-spacing:.32em;text-transform:uppercase;font-size:12px;color:var(--brass)}
.andon-h1{font-family:var(--display);font-size:clamp(40px,8vw,84px);color:var(--bone);line-height:1}

.andon-phase{font-family:var(--display);font-size:clamp(28px,4vw,48px);letter-spacing:.04em}

.andon-bomb{font-family:var(--type);font-size:clamp(15px,2vw,23px);letter-spacing:.05em;padding:10px 18px;border-radius:4px;border:1px solid}

@keyframes bombpulse{0%,100%{opacity:1}50%{opacity:.5}}
.andon-timeline{display:flex;flex-wrap:wrap;gap:8px}
.andon-chip{font-family:var(--type);font-size:clamp(12px,1.5vw,16px);letter-spacing:.05em;padding:7px 13px;border-radius:3px;border:1px solid var(--line-soft);color:var(--muted);background:var(--fog)}
.andon-chip.current{color:var(--ink);background:var(--brass);border-color:var(--brass);font-weight:bold}
.andon-chip.deadline{color:#f0b6b4;border-color:var(--oxblood);background:rgba(187,69,67,.1)}
.andon-stage{display:grid;grid-template-columns:1.35fr 1fr;gap:22px;flex:1;align-items:start}
@media(max-width:900px){.andon-stage{grid-template-columns:1fr}}
.andon-cue{display:flex;flex-direction:column;gap:16px}
.andon-card{background:var(--fog);border:1px solid var(--line-soft);border-radius:5px;padding:24px 26px}
.andon-card.day{border-left:4px solid var(--brass)}
.andon-card.night{border-left:4px solid #4b6aa0}
.andon-card.mini{padding:16px 18px;opacity:.9}
.andon-card.muted .andon-card-t{color:var(--steel)}
.andon-card-k{font-family:var(--type);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.andon-card-t{font-family:var(--display);font-size:clamp(26px,3.3vw,42px);color:var(--brass-soft);line-height:1.08}
.andon-card-t.small{font-size:clamp(20px,2.3vw,28px)}
.andon-card-x{font-family:var(--body);font-size:clamp(16px,1.7vw,22px);color:var(--text);line-height:1.45;margin-top:10px}
.andon-clue{background:linear-gradient(180deg,rgba(205,164,52,.14),rgba(205,164,52,.04));border:1px solid var(--brass);border-radius:5px;padding:28px}
.andon-clue .andon-card-k{color:var(--brass)}
.andon-clue-t{font-family:var(--display);font-size:clamp(30px,4.4vw,56px);color:var(--brass);line-height:1.1;margin-top:8px}
.andon-players{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;align-content:start}
.andon-p{background:var(--fog);border:1px solid var(--line-soft);border-radius:4px;padding:12px 14px;text-align:center}
.andon-p.dead{opacity:.5}
.andon-p.dead .andon-p-name{text-decoration:line-through}
.andon-p-name{font-family:var(--body);font-size:19px;color:var(--bone)}
.andon-p-role{font-family:var(--type);font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-top:5px}
.andon-p-role.civilian{color:#efe7d4}
.andon-p-role.gang{color:#d98785}
.andon-p-role.solo{color:var(--steel)}
.andon-p-role.hidden{color:var(--muted);font-style:italic;text-transform:none;letter-spacing:0}
.andon-p-cause{font-family:var(--type);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.andon-verdict{text-align:center;padding:30px;border:1px solid var(--brass);border-radius:6px;background:rgba(0,0,0,.28)}
.andon-verdict-k{font-family:var(--type);letter-spacing:.2em;text-transform:uppercase;font-size:13px;color:var(--muted)}
.andon-verdict-t{font-family:var(--display);font-size:clamp(34px,5vw,64px);color:var(--brass-soft);margin:6px 0}
.andon-verdict-t.green{color:var(--safe)}
.andon-verdict-x{font-family:var(--body);font-size:20px;color:var(--text)}/* role reveal card (random dealing) – white civilians, red gang, black solo */
.role-card{border-radius:6px;padding:20px 18px;text-align:center;margin:10px 0}
.role-card.civilian{background:#f2ecdc;color:#1b1b1b;border:1px solid #cdc4a8}
.role-card.gang{background:var(--oxblood);color:#fff}
.role-card.solo{background:#0c0d10;color:#f1f1f1;border:1px solid var(--steel)}
.role-card-name{font-family:var(--display);font-size:30px;line-height:1.1}
.role-card-fac{font-family:var(--type);font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.78;margin-top:5px}
.clue-reminder{margin-top:14px;padding-top:12px;border-top:1px dashed rgba(42,37,32,.22)}
.clue-reminder-k{font-family:var(--type);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--parch-muted);margin-bottom:7px}
.clue-reminder-list{display:flex;flex-wrap:wrap;gap:6px}
.cr-item{font-family:var(--body);font-size:14px;color:var(--parch-ink);background:rgba(42,37,32,.06);border:1px solid rgba(42,37,32,.16);border-radius:3px;padding:4px 9px}
.cr-item .cr-role{color:var(--parch-muted);font-size:12px}
.cr-item.out{opacity:.45;text-decoration:line-through}

<body>
<div class="wrap" id="app"></div>
<div class="overlay" id="overlay" aria-modal="true" role="dialog"></div>

<script>
/* ============================================================
   SHERLOCK IN THE CITY – Game Master Console
   ============================================================ */

const CHARACTERS = [
  {key:'sherlock',  name:'Sherlock Holmes',    faction:'civilian'},
  {key:'watson',    name:'Doctor Watson',      faction:'civilian'},
  {key:'hudson',    name:'Mrs Hudson',         faction:'civilian'},
  {key:'lestrade',  name:'Inspector Lestrade', faction:'civilian'},
  {key:'mycroft',   name:'Mycroft Holmes',     faction:'civilian'},
  {key:'baker',     name:'Baker',              faction:'civilian'},
  {key:'taxi',      name:'Taxi Driver',        faction:'civilian'},
  {key:'singer',    name:'Singer',             faction:'civilian'},
  {key:'boss',      name:'Boss',               faction:'gang'},
  {key:'pickpocket',name:'Pickpocket',         faction:'gang'},
  {key:'sharper',   name:'Sharper',            faction:'gang'},
  {key:'smuggler',  name:'Smuggler',           faction:'gang'},
  {key:'hacker',    name:'Telephone Operator',  faction:'gang'},
  {key:'moriarty',  name:'Moriarty',           faction:'solo'},
  {key:'terrorist', name:'Terrorist',          faction:'solo'},
];
const GANG_KEYS = ['boss','pickpocket','sharper','smuggler','hacker'];
const FACTION_LABEL = {civilian:'Civilians', gang:'The Gang', solo:'Unaligned'};

/* ---------- event deck (drawn live, marked here) ---------- */
const EVENTS = [
  {id:1, title:'Faces in the Fog', text:"Last night, Mrs. Hudson went to fetch water and saw her mysterious guests. However, in the darkness, she couldn't tell who was who."},
  {id:2, title:'Whitehall Knows', text:"Last night, the Government received a secret message from an anonymous source. It contained only one sentence: the name of the Terrorist."},
  {id:3, title:'Yeast We Could Do', text:"The Baker has run out of yeast! If he doesn't get some urgently, the people of London will be left without his delicious buns by morning! To prevent this, the Baker makes a deal with the Smuggler."},
  {id:4, title:"A Gentleman's Escort", text:"During the evening's performance, Lestrade left Singer a generous tip and walked her home. Tonight, they are both untouchable."},
  {id:5, title:'The Walls Have Ears', text:"The Telephone Operator managed to intercept a government communications channel. In the message being transmitted, she spotted and deciphered the following: the identity of the Terrorist."},
  {id:6, title:'Fresh Out', text:"The Taxi Driver ran out of prohibited something tonight."},
  {id:7, title:'Know Thy Enemy', text:"Sherlock stays awake all night trying to figure out who his sworn enemy is. Tonight, he'll get an additional clue about Moriarty's feature."},
  {id:8, title:'The Wrong Wallet', text:"The Pickpocket, without knowing it, stole the wallet of Inspector Lestrade himself, and thanks to this, he learned his identity, but also framed himself."},
  {id:9, title:'Trust no one', text:"Doubts creep into the Boss's mind about the loyalty of his subordinates. He can't trust them, and tonight he acts alone."},
  {id:10, title:'All Quiet', text:"Quiet night! Nobody wakes up today."},
];
const EVENT_EFFECT = {
  1:"Mrs Hudson learns how many mysterious guests are still about – but not who.",
  2:"Mycroft (the Government) is told the Terrorist's name.",
  3:"The Baker and the Smuggler are both untouchable tonight.",
  4:"Inspector Lestrade and the Singer are both untouchable tonight.",
  5:"The Telephone Operator is told the Terrorist's name.",
  6:"The Taxi Driver is out of contraband – he doesn't wake tonight.",
  7:"Sherlock gets an extra clue about Moriarty before the roles wake.",
  8:"The Pickpocket learns who Lestrade is; Lestrade learns the Pickpocket is Gang.",
  9:"The Gang's kill is the Boss's alone tonight – if he is dead, the Gang sits out.",
  10:"No one wakes and no one falls.",
};
const EVENT_INVOLVED = {1:['hudson'],2:['mycroft','terrorist'],3:['baker','smuggler'],4:['lestrade','singer'],5:['hacker','terrorist'],6:['taxi'],7:['sherlock','moriarty'],8:['pickpocket','lestrade'],9:['boss'],10:[]};

/* ---------- day event deck (drawn at the start of each day) ---------- */
const DAY_EVENTS = [
  {id:1, title:'Pitch Black', text:"A pitch-black fog has descended on London. It's so thick that we have to feel our way around. This afternoon the Discussion is being conducted with eyes closed. Anyone who violates this rule will not participate in the Voting."},
  {id:2, title:'Festival', text:"There is a Festival today! To be heard during the Discussion, you'll have to shout. Anyone who violates this rule will not participate in the Voting."},
  {id:3, title:'Music to my ears', text:"Sherlock Holmes has been playing his violin since early morning. To maintain the harmony, everybody will have to sing during the Discussion. Anyone who violates this rule will not participate in the Voting."},
  {id:4, title:'Dog-eat-dog world', text:"Everyone is under suspicion! As a precaution, everyone is handcuffed together. Today's discussion will have to be conducted hand in hand. Anyone who violates this rule will not participate in the Voting."},
  {id:5, title:'Desired numbers', text:"A telephone operator has promised to reveal the winning lottery numbers as soon as they are received. The line is poor, and even the slightest noise may cause important words to be missed. You must remain silent during today's Discussion and Voting. Anyone who violates this rule will not participate in the Voting."},
  {id:6, title:'Love and Peace', text:"Today is Peace Day! Executions cannot be carried out on such a significant day. There will be no voting today."},
  {id:7, title:'Secret Language', text:"Interpol believes criminals have developed a secret language and can communicate even during the day. As a precaution, there will be no Discussion today. Go straight to Voting."},
  {id:8, title:'God bless the Queen', text:"Today is the Queen's birthday! Everyone is invited to a gala dinner and must polish their manners. During today's Discussion, before making a guess, you must compliment another player. Anyone who violates this rule will not participate in the Voting."},
  {id:9, title:"Fools' Day", text:"April 1st! During today's Discussion, before making a guess, you must make a funny face. Anyone who violates this rule will not participate in the Voting."},
  {id:10, title:'Curfew', text:"A mysterious virus is raging in London. Everybody must stay at home to keep safe and sound. Use your hand-phones for today's Discussion. Remember: you can't see each other so gestures will not be helpful. Anyone who violates this rule will not participate in the Voting."},
];

let state;

function freshState(){
  return {
    screen:'choose',   // 'choose' | 'setup' | 'random-roles' | 'random-deal' | 'game' | 'ended'
    method:null,       // 'cards' | 'random'
    eventMode:null,    // 'manual' (draw cards, pick from list) | 'random' (console draws)
    draft:{},          // key -> player name (manual setup)
    roster:[],         // active players {key,name,faction,player,alive}
    // random-draw scratch
    rndSelected:[],    // role keys chosen to be in play
    rndRemaining:[],   // role keys not yet dealt
    rndAssigned:[],    // [{key, player}] dealt so far
    round:1,
    phase:'night',     // 'night' | 'day'
    taxiProtect:null,  // key with immunity (current night + nearest vote)
    bossShelter:null,  // key sheltered by the Boss (survives night + immune nearest vote, still acts)
    bossShelterUsed:false, // Boss's sanctuary is once per game
    latestClue:'',
    clues:[],          // [{round,text}] history of Sherlock's clues
    moves:[],          // [{round,phase,abbr,key}] targeting markers for the matrix
    eventByRound:{},   // round -> event title (for the matrix's event row)
    log:[],
    gameOver:false,
    endTitle:'', endTone:'', endSub:'',   // verdict, mirrored to the player screen
    // player screen (Andon) settings
    revealMode:'open',     // 'open' | 'voting' | 'closed'
    terroristMode:'open',  // 'open' (show real safety) | 'closed' (bomb warning until Day V)
    liveClue:null,         // current night's clue text, shown live on the Andon for Sherlock
    usedEvents:[],     // ids of events already drawn (removed from the deck)
    usedDayEvents:[],  // ids of day events already drawn
    dayEventByRound:{},// round -> {id,title,text} active day event (display only, not in history)
    // transient night
    nightEvent:null,   // {id, skipTaxi, bossAlone, untouchable, quiet}
    nightQueue:[],
    nightIdx:0,
    choices:{},
    lestradeRevealed:false,
  };
}

/* ---------- helpers ---------- */
const $ = sel => document.querySelector(sel);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const byKey = k => state.roster.find(r=>r.key===k);
const alive = () => state.roster.filter(r=>r.alive);
const inPlay = k => !!byKey(k);
const isAlive = k => { const r=byKey(k); return !!(r && r.alive); };
const countAlive = fac => state.roster.filter(r=>r.faction===fac && r.alive).length;
const countTotal = fac => state.roster.filter(r=>r.faction===fac).length;
const roman = n => ['0','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'][n] || String(n);

function logEvent(text){
  state.log.unshift({tag:(state.phase==='night'?'Night ':'Day ')+roman(state.round), text});
}

/* ---------- night-action helpers ---------- */
const STUPEFIED='__stupefied__';
function gangStupefied(){
  const g=state.roster.filter(r=>r.faction==='gang'&&r.alive);
  return g.length>0 && g.every(m=>m.key===state.taxiProtect);
}

let _contrabandNext=null;
function showContraband(actorLabel, member, choiceSetter){
  _contrabandNext = ()=>{ if(choiceSetter) choiceSetter(); advanceStep(); };
  const who = member ? `${esc(member.player)} (${esc(member.name)}) ` : '';
  logEvent(`${actorLabel} took the Taxi Driver's contraband – no action tonight.`);
  showModal(`
    <div class="stamp">No action</div>
    <div class="step-no">⊘</div>
    <div class="modal-eyebrow">${esc(actorLabel)} · under the influence</div>
    <div class="modal-title">On the Taxi Driver's contraband</div>
    <div class="reveal miss" style="text-align:left">${who}is the Taxi Driver's fare tonight and too far gone on contraband to act. This role does nothing this round.</div>
    <p class="modal-instr">Wake them only as a bluff if your table plays it that way, then move on.</p>
    <div class="modal-actions"><button class="btn confirm" onclick="contrabandContinue()">Continue</button></div>`);
}
function contrabandContinue(){ const f=_contrabandNext; _contrabandNext=null; if(typeof f==='function') f(); }

/* ============================================================
   ENTRY — choose how roles are dealt
   ============================================================ */
function renderChoose(){
  $('#app').innerHTML = `
    <header class="masthead">
      <div class="crest">Baker Street · Case Files</div>
      <div class="eyebrow">Authorial Mafia · Game Master Console</div>
      <h1 class="title">Sherlock in the City</h1>
      <div class="subtitle">How will the roles be dealt?</div>
      <p class="lede">Choose how to assign roles for this case. Deal from real cards and type each player in by hand, or let the console draw roles at random and reveal each one privately.</p>
    </header>
    <div class="method-grid">
      <button class="method-card" onclick="chooseMethod('cards')">
        <span class="method-ic">🂠</span>
        <span class="method-name">Deal from cards</span>
        <span class="method-desc">You hand out physical role cards and type each player's name next to their role.</span>
      </button>
      <button class="method-card" onclick="chooseMethod('random')">
        <span class="method-ic">🎲</span>
        <span class="method-name">Random draw</span>
        <span class="method-desc">Pick which roles are in play, then enter players one by one – the console assigns a random role and reveals it.</span>
      </button>
    </div>`;
}
function chooseMethod(m){
  state.method=m;
  state.screen = (m==='cards') ? 'setup' : 'random-roles';
  render();
}
function backToChoose(){ state.screen='choose'; render(); }

/* ---------- random draw · step 1: which roles are in play ---------- */
function renderRandomRoles(){
  const groups=['civilian','gang','solo'];
  const sections = groups.map(fac=>{
    const chars=CHARACTERS.filter(c=>c.faction===fac);
    const rows=chars.map(c=>`
      <label class="pickrole ${fac}" for="rl-${c.key}">
        <input type="checkbox" id="rl-${c.key}" ${state.rndSelected.includes(c.key)?'checked':''}
               onchange="toggleRndRole('${c.key}', this.checked)">
        <span class="pickrole-name"><span class="dot ${fac}"></span>${esc(c.name)}</span>
      </label>`).join('');
    return `<div class="dossier">
        <div class="dossier-head"><span class="faction-name ${fac}">${FACTION_LABEL[fac]}</span><span class="faction-tally" id="rtally-${fac}"></span></div>
        ${rows}
      </div>`;
  }).join('');
  $('#app').innerHTML = `
    <header class="masthead">
      <div class="crest">Baker Street · Case Files</div>
      <div class="eyebrow">Random draw · step 1 of 2</div>
      <h1 class="title" style="font-size:clamp(30px,5vw,48px)">Which roles are in play?</h1>
      <p class="lede">Tick every role that belongs in this case. The console deals exactly these roles, one per player, at random.</p>
    </header>
    <h2 class="sec">Choose the cast</h2>
    <div class="dossier-grid">${sections}</div>
    <div class="setup-foot">
      <div>
        <div class="count-note">Roles selected: <b id="rndCount">0</b></div>
        <div class="warn" id="rndWarn">Select at least two roles to deal.</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn ghost" onclick="backToChoose()">Back</button>
        <button class="btn" onclick="confirmRandomRoles()">Deal to players</button>
      </div>
    </div>`;
  updateRndCount();
}
function toggleRndRole(key, on){
  const i=state.rndSelected.indexOf(key);
  if(on && i<0) state.rndSelected.push(key);
  if(!on && i>=0) state.rndSelected.splice(i,1);
  updateRndCount();
}
function updateRndCount(){

// Shared by both the cards path and the random draw: build the roster, then ask the event mode
function launchGame(assignments){
  const roster = assignments
    .filter(a=>(a.player||'').trim()!=='')
    .map(a=>{ const c=CHARACTERS.find(x=>x.key===a.key);
              return {key:c.key,name:c.name,faction:c.faction,player:a.player.trim(),alive:true,deathCause:null}; });
  state.roster=roster;
  state.screen='event-mode';
  render();
}

/* ---------- manual override ---------- */
function manualToggle(key){
  const r=byKey(key); if(!r) return;
  r.alive=!r.alive;
  r.deathCause = r.alive ? null : 'manual';
  logEvent(r.alive ? `${r.player} (${r.name}) revived by the host.` : `${r.player} (${r.name}) marked out by the host.`);
  if(checkWin()){ return; }
  render();
}

/* ---------- day/night tracker ---------- */
function buildTracker(){
  const chips=[];
  for(let r=1;r<=state.round;r++){
    const nCur = (state.phase==='night' && r===state.round);
    chips.push({ic:'☾', label:'Night '+roman(r), kind:'night', current:nCur});
    const showDay = (r<state.round) || (r===state.round && state.phase==='day');
    if(showDay){
      chips.push({ic:'☀', label:'Day '+roman(r), kind:'day', current:(state.phase==='day' && r===state.round)});
    }
  }
  let html = chips.map(c=>`<span class="track-chip ${c.kind} ${c.current?'current':'past'}"><span class="ic">${c.ic}</span>${esc(c.label)}</span>`).join('');
  if(inPlay('terrorist') && isAlive('terrorist') && state.round<5){
    html += `<span class="track-chip deadline" title="The Terrorist detonates at the start of Day 5"><span class="ic">💣</span>Day V</span>`;
  }
  return `<div class="tracker">${html}</div>`;
}

/* ---------- move-history matrix ---------- */
function cellMarks(round, phase, key){
  const ms = state.moves.filter(m=>m.round===round && m.phase===phase && m.key===key);
  if(!ms.length) return '<span class="mk-none">–</span>';
  return ms.map(m=>`<span class="mk mk-${m.abbr}">${m.abbr}</span>`).join(' ');
}
function buildGrid(){
  const maxR = state.round;
  if(state.moves.length===0 && Object.keys(state.eventByRound).length===0){
    return `<div class="moves-empty">No moves recorded yet. They'll appear here as the nights unfold.</div>`;
  }
  const rounds=[]; for(let r=1;r<=maxR;r++) rounds.push(r);
  const evRow  = rounds.map(r=>`<td class="grid-ev" colspan="2">${esc(state.eventByRound[r]||'–')}</td>`).join('');
  const hdrRow = rounds.map(r=>`<th>N${r}</th><th>D${r}</th>`).join('');
  const order = {civilian:0,gang:1,solo:2};
  const playerRows = [...state.roster].sort((a,b)=>order[a.faction]-order[b.faction]).map(p=>{
    const cells = rounds.map(r=>`<td>${cellMarks(r,'night',p.key)}</td><td>${cellMarks(r,'day',p.key)}</td>`).join('');
    return `<tr class="${p.alive?'':'grid-dead'}"><th class="grid-player">${esc(p.player)}<span class="grid-role">${esc(p.name)}</span></th>${cells}</tr>`;
  }).join('');
  return `<div class="mv-scroll" id="mvScroll"><table class="grid"><tbody>
      <tr class="grid-evrow"><th class="grid-corner">Night event</th>${evRow}</tr>
      <tr class="grid-hdr"><th class="grid-corner"></th>${hdrRow}</tr>
      ${playerRows}
    </tbody></table></div>
    <div class="grid-legend"><b>TD</b> Taxi Driver · <b>G</b> Gang · <b>M</b> Moriarty · <b>DW</b> Dr Watson · <b>IL</b> Lestrade · <b>B</b> Boss shelter · <b>V</b> Vote</div>`;
}

function showModal(html, cls=''){

function selectableList({exclude=[], noneLabel=null}={}){
  let rows = alive()
    .filter(r=> !exclude.includes(r.key))
    .map(r=>`
      <label class="pick">
        <input type="radio" name="pick" value="${r.key}">
        <span class="pick-name">${esc(r.player)}</span>

    rows += `<label class="pick pick-none"><input type="radio" name="pick" value="__none__"><span class="pick-name">${esc(noneLabel)}</span></label>`;
  }
  return `<div class="picklist">${rows}</div>`;
}
// Players who cannot be chosen as a victim tonight: the Taxi's fare + any event-untouchable
function victimExclude(){
  const ex=[];
  if(state.taxiProtect) ex.push(state.taxiProtect);
  const u=(state.nightEvent && state.nightEvent.untouchable)||[];
  u.forEach(k=>{ if(!ex.includes(k)) ex.push(k); });
  return ex;
}
// Players dropped from the Taxi's later lists / the day vote (immunity only)
function laterListExclude(){ return state.taxiProtect ? [state.taxiProtect] : []; }
// Players who cannot be condemned in the nearest day vote (immunity only)
function voteExclude(){
  const ex=[];
  if(state.taxiProtect) ex.push(state.taxiProtect);
  if(state.bossShelter && !ex.includes(state.bossShelter)) ex.push(state.bossShelter);
  return ex;
}
function readPick(){
  const el=document.querySelector('input[name="pick"]:checked');
  if(!el) return undefined;
  return el.value==='__none__' ? null : el.value;
}

/* ============================================================
   NIGHT CYCLE
   ============================================================ */
function beginNight(){
  if(state.eventMode==='random'){ return drawRandomEvent(); }
  const pool = EVENTS.filter(e=>!state.usedEvents.includes(e.id));
  let list = pool.map(e=>`
    <label class="pick evt-pick">
      <input type="radio" name="pick" value="${e.id}">
      <span class="evt-pick-main"><span class="evt-pick-title">${esc(e.title)}</span><span class="evt-pick-text">${esc(e.text)}</span></span>
    </label>`).join('');
  list += `<label class="pick pick-none"><input type="radio" name="pick" value="__none__"><span class="pick-name">No event card this night</span></label>`;
  const note = pool.length ? '' : `<p class="modal-instr">Every event card has been drawn. Choose "no event card" to run an ordinary night.</p>`;
  showModal(`
    <div class="stamp">Night ${roman(state.round)}</div>
    <div class="step-no">☾</div>
    <div class="modal-eyebrow">Draw an event</div>
    <div class="modal-title">Which card came up?</div>
    <p class="modal-instr">Pull a card from the deck for real, then mark it here. Spent cards drop off the list.</p>
    ${note}
    <div class="picklist evt-list">${list}</div>
    <div class="modal-actions"><button class="btn confirm" onclick="confirmEvent()">This one</button></div>`);
}
function confirmEvent(){
  const el=document.querySelector('input[name="pick"]:checked');
  if(!el) return;
  const v = el.value==='__none__' ? null : parseInt(el.value,10);
  applyEvent(v);
}
// Digital random mode: the console draws a random unused night event (or none if the deck is spent)
function drawRandomEvent(){
  const pool = EVENTS.filter(e=>!state.usedEvents.includes(e.id));
  if(!pool.length){ applyEvent(null); return; }
  const ev = pool[Math.floor(Math.random()*pool.length)];
  applyEvent(ev.id);
}
function buildEventFlags(ev){
  const f={id:ev.id, skipTaxi:false, bossAlone:false, untouchable:[], quiet:false};
  if(ev.id===3) f.untouchable=['baker','smuggler'];
  if(ev.id===4) f.untouchable=['lestrade','singer'];
  if(ev.id===6) f.skipTaxi=true;
  if(ev.id===9) f.bossAlone=true;
  if(ev.id===10) f.quiet=true;
  return f;
}
function applyEvent(id){
  const ev = id ? EVENTS.find(e=>e.id===id) : null;
  state.liveClue = null; // a fresh night – clear last night's Sherlock clue
  if(ev){
    state.usedEvents.push(ev.id);
    state.nightEvent = buildEventFlags(ev);
    state.eventByRound[state.round] = ev.title;
    logEvent(`Event drawn: "${ev.title}".`);
  } else {
    state.nightEvent = {id:null};
    state.eventByRound[state.round] = '–';
    logEvent('No event card drawn this night.');
  }
  broadcastAndon(); // surface the new night event on the player screen
  showEventBriefing(ev);
}
function eventAnnotations(id){
  const keys = EVENT_INVOLVED[id]||[];
  const notes=[];
  keys.forEach(k=>{
    const meta = CHARACTERS.find(c=>c.key===k);
    const r=byKey(k);
    if(!r) notes.push(`${meta.name} is not in play.`);
    else if(!r.alive) notes.push(`${meta.name} (${r.player}) is already dead.`);
  });
  if(!notes.length) return '';
  return `<p class="modal-instr" style="color:#7e2c2b">Note: ${notes.map(esc).join(' ')} Resolve as your table sees fit.</p>`;
}
function showEventBriefing(ev){
  if(!ev){ runNight(); return; }
  const eff = EVENT_EFFECT[ev.id] || '';
  const annot = eventAnnotations(ev.id);
  const quiet = ev.id===10;
  showModal(`
    <div class="stamp">Event drawn</div>
    <div class="step-no">${quiet?'☾':'❖'}</div>
    <div class="modal-eyebrow">${esc(ev.title)}</div>
    <div class="modal-title" style="font-size:23px;line-height:1.26">${esc(ev.text)}</div>
    ${eff?`<div class="event-callout"><span class="ic">⚙</span><span><span class="et">In effect</span><span class="eb">${esc(eff)}</span></span></div>`:''}
    ${annot}
    <div class="modal-actions"><button class="btn confirm" onclick="${quiet?'resolveQuietNight()':'runNight()'}">${quiet?'Let them sleep':'Start the Night'}</button></div>`);
}
function resolveQuietNight(){
  logEvent('A quiet night. No one acted, no one fell.');
  closeModal();
  endNightResolve([], null);
}

function runNight(){
  state.choices={gangVictim:undefined,moriartyVictim:undefined,watsonHeal:undefined,lestradeTarget:undefined,taxiProtect:undefined,bossShelter:undefined,clue:undefined};
  const ev = state.nightEvent || {id:null};
  const q=[];
  // event-driven steps at the start of the night
  if(ev.id===1) q.push('evt_hudson');
  if(ev.id===2) q.push('evt_mycroft');
  if(ev.id===5) q.push('evt_hacker');
  if(ev.id===7 && isAlive('sherlock')) q.push('evt_sherlock_extra');
  if(ev.id===8) q.push('evt_pickpocket');
  // regular wake order, modified by the event
  if(isAlive('taxi') && !ev.skipTaxi) q.push('taxi');
  if(ev.bossAlone){ if(isAlive('boss')) q.push('gang'); }
  else if(countAlive('gang')>0) q.push('gang');
  if(isAlive('moriarty')) q.push('moriarty');
  if(isAlive('watson')) q.push('watson');
  if(isAlive('lestrade')) q.push('lestrade');
  if(isAlive('sherlock')) q.push('sherlock');
  state.nightQueue=q;
  state.nightIdx=0;
  nextNightStep();
}

function nextNightStep(){
  if(state.nightIdx>=state.nightQueue.length){ closeModal(); resolveNight(); return; }
  const step=state.nightQueue[state.nightIdx];
  ({taxi:stepTaxi, gang:stepGang, moriarty:stepMoriarty, watson:stepWatson, lestrade:stepLestrade, sherlock:stepSherlock,
    evt_hudson:evtStepHudson, evt_mycroft:evtStepMycroft, evt_hacker:evtStepHacker, evt_sherlock_extra:evtStepSherlockExtra, evt_pickpocket:evtStepPickpocket}[step])();
}
function advanceStep(){ state.nightIdx++; nextNightStep(); }

/* ---------- night resolution ---------- */
function recordNightMoves(c){
  const mark=(abbr,v)=>{ if(v && v!==STUPEFIED) state.moves.push({round:state.round, phase:'night', abbr, key:v}); };
  mark('TD', c.taxiProtect);
  mark('G',  c.gangVictim);
  mark('M',  c.moriartyVictim);
  mark('DW', c.watsonHeal);
  mark('IL', c.lestradeTarget);
  if(c.bossShelter) state.moves.push({round:state.round, phase:'night', abbr:'B', key:c.bossShelter});
}

function resolveNight(){
  const c=state.choices;
  recordNightMoves(c);

  // a stupefied actor (knocked out by contraband) deals no blow
  const gv = (c.gangVictim && c.gangVictim!==STUPEFIED) ? c.gangVictim : null;
  const mv = (c.moriartyVictim && c.moriartyVictim!==STUPEFIED) ? c.moriartyVictim : null;
  const wh = (c.watsonHeal && c.watsonHeal!==STUPEFIED) ? c.watsonHeal : null;

  const untouchable = (state.nightEvent && state.nightEvent.untouchable) || [];
  const victims=[];
  if(gv) victims.push(gv);
  if(mv) victims.push(mv);
  const unique=[...new Set(victims)];

  const summary=[];
  unique.forEach(k=>{
    const r=byKey(k); if(!r) return;
    const healed = (wh===k);
    const sheltered = (state.taxiProtect===k);
    const safe = untouchable.includes(k);
    const sanctuary = (state.bossShelter===k);
    if(healed || sheltered || safe || sanctuary){
      const how = healed ? 'saved by Doctor Watson'
                : sheltered ? 'sheltered by the Taxi Driver'
                : sanctuary ? 'given sanctuary by the Boss'
                : 'untouchable tonight';
      summary.push({type:'saved', text:`${r.player} (${r.name}) – attacked but ${how}.`});
    } else {
      r.alive=false;
      r.deathCause='night';
      summary.push({type:'killed', text:`${r.player} (${r.name}) – found dead at dawn.`});
    }
  });

  // Sherlock's ordinary clue (event #7 handles its own extra clue separately)
  let clueForReport='';
  if(c.clue && c.clue!==STUPEFIED){
    clueForReport=c.clue;
    state.clues.push({round:state.round, text:c.clue});
    state.latestClue=c.clue;
    logEvent(`Sherlock posts a clue: "${c.clue}".`);
  }

  summary.filter(s=>s.type==='killed').forEach(s=>logEvent(s.text));
  if(summary.filter(s=>s.type==='killed').length===0) logEvent('Dawn breaks – no bodies tonight.');

  endNightResolve(summary, clueForReport);
}

function endNightResolve(summary, clue){
  // night-summary modal, then move to day
  const rows = summary.length
    ? summary.map(s=>`<div class="sum-row"><span class="mark ${s.type}">${s.type==='killed'?'Deceased':'Survived'}</span><span>${esc(s.text)}</span></div>`).join('')
    : `<div class="sum-row"><span class="mark quiet">Quiet</span><span>No one fell during the night.</span></div>`;
  const clueBlock = (clue) ? `<div class="reveal hit" style="text-align:center"><span class="eyebrow" style="color:var(--parch-muted)">Sherlock's clue</span><div style="font-family:var(--display);font-size:24px;margin-top:6px">${esc(clue)}</div></div>` : '';

  showModal(`
    <div class="stamp">Dawn report</div>
    <div class="step-no">☀</div>
    <div class="modal-eyebrow">End of Night ${roman(state.round)}</div>
    <div class="modal-title">Morning in the city</div>
    <div class="sum-list">${rows}</div>
    ${clueBlock}
    <div class="modal-actions"><button class="btn confirm" onclick="toDay()">Open Day ${roman(state.round)}</button></div>`);
}

function toDay(){
  closeModal();
  state.phase='day';
  // 1) bomb timer takes precedence at the start of Day 5
  if(state.round>=5 && inPlay('terrorist') && isAlive('terrorist')){
    return endGame('The bomb exploded – the Terrorist won!', 'terror',
      'Day 5 dawned with the Terrorist still at large. The fuse ran out.');
  }
  // 2) faction outcomes
  const enterDay = ()=>{ render(); beginDay(); };
  if(checkWin(enterDay)) return;  // a surrender will resume via enterDay()
  enterDay();
}

/* ============================================================
   DAY EVENTS — drawn at the start of each day (display only)
   ============================================================ */
function beginDay(){
  if(state.eventMode==='random'){ return drawRandomDayEvent(); }
  const pool = DAY_EVENTS.filter(e=>!state.usedDayEvents.includes(e.id));
  let list = pool.map(e=>`
    <label class="pick evt-pick">
      <input type="radio" name="pick" value="${e.id}">
      <span class="evt-pick-main"><span class="evt-pick-title">${esc(e.title)}</span><span class="evt-pick-text">${esc(e.text)}</span></span>
    </label>`).join('');
  list += `<label class="pick pick-none"><input type="radio" name="pick" value="__none__"><span class="pick-name">No event card today</span></label>`;
  const note = pool.length ? '' : `<p class="modal-instr">Every day-event card has been drawn. Choose "no event card" for an ordinary day.</p>`;
  showModal(`
    <div class="stamp">Day ${roman(state.round)}</div>
    <div class="step-no">☀</div>
    <div class="modal-eyebrow">Draw a day event</div>
    <div class="modal-title">Which card came up?</div>
    <p class="modal-instr">Pull a day card for real, then mark it here. Spent cards drop off the list.</p>
    ${note}
    <div class="picklist evt-list">${list}</div>
    <div class="modal-actions"><button class="btn confirm" onclick="confirmDayEvent()">This one</button></div>`);
}
function confirmDayEvent(){
  const el=document.querySelector('input[name="pick"]:checked');
  if(!el) return;
  const v = el.value==='__none__' ? null : parseInt(el.value,10);
  applyDayEvent(v);
}
function drawRandomDayEvent(){
  const pool = DAY_EVENTS.filter(e=>!state.usedDayEvents.includes(e.id));
  if(!pool.length){ applyDayEvent(null); return; }
  const ev = pool[Math.floor(Math.random()*pool.length)];
  applyDayEvent(ev.id);
}
function applyDayEvent(id){
  const ev = id ? DAY_EVENTS.find(e=>e.id===id) : null;
  if(ev){
    state.usedDayEvents.push(ev.id);
    state.dayEventByRound[state.round] = {id:ev.id, title:ev.title, text:ev.text};
    logEvent(`Day event: "${ev.title}".`);
    showModal(`
      <div class="stamp">Day event</div>
      <div class="step-no">☀</div>
      <div class="modal-eyebrow">${esc(ev.title)}</div>
      <div class="modal-title" style="font-size:23px;line-height:1.26">${esc(ev.text)}</div>
      ${ev.id===6?`<div class="event-callout"><span class="ic">⚖</span><span><span class="et">In effect</span><span class="eb">No execution today – the vote is skipped.</span></span></div>`:''}
      <div class="modal-actions"><button class="btn confirm" onclick="closeDayBriefing()">Read to the table</button></div>`);
  } else {
    delete state.dayEventByRound[state.round];
    closeModal();
    render();
  }
}
function closeDayBriefing(){ closeModal(); render(); }
// Love and Peace (#6): no execution – advance straight to the next night
function noVoteToNight(){
  logEvent('No voting today (Love and Peace).');
  state.taxiProtect=null;
  state.bossShelter=null;
  const advance = ()=>{ state.round++; state.phase='night'; render(); };
  if(checkWin(advance)) return;
  advance();
}

/* ============================================================
   DAY VOTE
   ============================================================ */
function openVote(){
  const immune=[];
  if(state.taxiProtect){ const r=byKey(state.taxiProtect); if(r) immune.push(`the Taxi Driver's fare (${esc(r.player)})`); }
  if(state.bossShelter){ const r=byKey(state.bossShelter); if(r) immune.push(`the Boss's sheltered ${esc(r.player)}`); }
  const note = immune.length
    ? `<p class="modal-instr">Note: ${immune.join(' and ')} ${immune.length>1?'are':'is'} immune from today's vote and not listed.</p>` : '';
  showModal(`
    <div class="stamp">Public square</div>
    <div class="step-no">⚖</div>
    <div class="modal-eyebrow">Day ${roman(state.round)} · the vote</div>
    <div class="modal-title">Whom does the city condemn?</div>
    ${note}
    ${selectableList({exclude:voteExclude(), noneLabel:'No one is condemned today'})}
    <div class="modal-actions"><button class="btn confirm" onclick="confirmVote()">Carry out the verdict</button></div>`);
}
function confirmVote(){
  const v=readPick(); if(v===undefined) return;
  closeModal();
  if(v){
    state.moves.push({round:state.round, phase:'day', abbr:'V', key:v});
    const r=byKey(v); r.alive=false; r.deathCause='vote';
    logEvent(`The city condemns ${r.player} (${r.name}).`);
  } else {
    logEvent('The city condemns no one today.');
  }
  // immunities are consumed after the vote
  state.taxiProtect=null;
  state.bossShelter=null;

  const advance = ()=>{ state.round++; state.phase='night'; render(); };
  if(checkWin(advance)) return;   // a surrender will resume via advance()
  advance();
}

/* ============================================================
   WIN CONDITIONS
   ============================================================ */
let _surrenderResume=null;
function checkWin(resume){
  const civ=countAlive('civilian');
  const gang=countAlive('gang');
  const mor=isAlive('moriarty');
  const ter=isAlive('terrorist');

  // Only Gang remain
  if(civ===0 && !mor && !ter && gang>0){
    endGame('The Gang won!', 'gang', 'Every honest soul and lone wolf is gone. The city belongs to the Gang.');
    return true;
  }
  // Only civilians remain
  if(gang===0 && !mor && !ter && civ>0){
    endGame('The Civilians won!', 'civ', 'The Gang is broken and the lone killers are down. The city is safe.');
    return true;
  }
  // The Boss stands alone among the Gang -> surrenders (non-terminal; resume the caller's flow)
  if(gang===1 && isAlive('boss')){
    const boss=byKey('boss');
    boss.alive=false;
    boss.deathCause='surrender';
    _surrenderResume = resume || null;
    logEvent('The gang leader is left alone and surrenders to the police.');
    showModal(`
      <div class="stamp">Surrender</div>
      <div class="step-no">⌖</div>
      <div class="modal-eyebrow">The last of the Gang</div>
      <div class="modal-title">The gang leader is left alone and voluntarily surrendered to the police.</div>
      <p class="modal-instr">${esc(boss.player)} (Boss) is removed from the game. The case continues as long as anyone besides civilians is still standing.</p>
      <div class="modal-actions"><button class="btn confirm" onclick="afterSurrender()">Continue</button></div>`);
    return true; // pause flow; afterSurrender resumes
  }
  // Lone unaligned survivors (clean termination)
  if(civ===0 && gang===0 && mor && !ter){
    endGame('Moriarty won!', 'solo', 'No one remains to stop the professor.');
    return true;
  }
  if(civ===0 && gang===0 && !mor && ter){
    endGame('The Terrorist won!', 'terror', 'Only the Terrorist is left standing.');
    return true;
  }
  return false;
}

function afterSurrender(){
  closeModal();
  const resume = _surrenderResume; _surrenderResume = null;
  // re-evaluate for a terminal win now that the Boss is gone
  if(checkWin()) return;
  if(resume) resume(); else render();
}

/* ============================================================
   END
   ============================================================ */
function endGame(title, tone, sub){
  state.gameOver=true;
  state.screen='ended';
  state.endTitle=title; state.endTone=tone||''; state.endSub=sub||'';
  logEvent('Verdict: '+title);
  broadcastAndon();
  $('#overlay').classList.add('show');
  $('#overlay').innerHTML = `
    <div class="modal verdict">
      <div class="modal-inner">
        <div class="verdict-eyebrow">Case closed · ${esc(state.phase==='night'?'Night ':'Day ')}${esc(roman(state.round))}</div>
        <div class="verdict-title ${tone}">${esc(title)}</div>
        <div class="verdict-sub">${esc(sub||'')}</div>
        <button class="btn" onclick="confirmRestart(true)">Begin a new case</button>
      </div>
    </div>`;
}

/* ============================================================
   RESTART
   ============================================================ */
function confirmRestart(force){
  if(force){ doRestart(); return; }
  showModal(`
    <div class="modal-eyebrow">Hold on</div>
    <div class="modal-title">Start a new case?</div>
    <p class="modal-instr">This clears the current game, the tally, and the log. There's no undo.</p>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Keep playing</button>
      <button class="btn" onclick="doRestart()">New case</button>
    </div>`);
}
function doRestart(){
  const keepDraft = state.draft;
  state=freshState();
  state.draft=keepDraft; // keep the seated names for convenience
  closeModal();
  render();
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  switch(state.screen){
    case 'choose':       renderChoose(); break;
    case 'setup':        renderSetup(); break;
    case 'random-roles': renderRandomRoles(); break;
    case 'random-deal':  renderRandomDeal(); break;
    case 'event-mode':   renderEventMode(); break;
    default:             renderGame();
  }
  broadcastAndon();
}

/* ============================================================
   ANDON — player-facing screen (second monitor)
   The host console and the Andon share one file; the Andon opens
   the same page with ?view=andon and listens over BroadcastChannel.
   ============================================================ */
let andonChannel=null;
function broadcastAndon(){
  if(!andonChannel) return;
  try{ andonChannel.postMessage(buildAndonSnapshot()); }catch(e){}
}
function lastNightEvent(){
  for(let r=state.round; r>=1; r--){
    const t=state.eventByRound[r];
    if(t && t!=='–'){ const ev=EVENTS.find(e=>e.title===t); return {title:t, text:ev?ev.text:''}; }
  }
  return null;
}
function bombStatus(){
  if(state.terroristMode==='open'){
    if(inPlay('terrorist') && isAlive('terrorist')) return {state:'ticking', text:'The bomb is ticking – Day '+roman(state.round)+' of V'};
    return {state:'safe', text:'The city is safe'};
  }
  // closed terrorist: the threat looms in secret…
  if(state.gameOver) return {state:'hidden', text:''};
  // …until Day V dawns with no explosion – then the city is openly saved
  if(state.round>=5 && state.phase==='day' && !isAlive('terrorist')){
    return {state:'safe', text:'The city was saved from the explosion'};
  }
  return {state:'ticking', text:'A bomb may be ticking – Day '+roman(state.round)+' of V'};
}
function buildAndonTimeline(){
  const chips=[];
  for(let r=1;r<=state.round;r++){
    chips.push({ic:'☾', label:'Night '+roman(r), kind:'night', current:(state.phase==='night'&&r===state.round)});
    const showDay=(r<state.round)||(r===state.round&&state.phase==='day');
    if(showDay) chips.push({ic:'☀', label:'Day '+roman(r), kind:'day', current:(state.phase==='day'&&r===state.round)});
  }
  if(bombStatus().state==='ticking' && state.round<5) chips.push({ic:'💣', label:'Day V', kind:'deadline', current:false});
  return chips;
}
function buildAndonSnapshot(){
  const reveal=state.revealMode, over=state.gameOver;
  const started = state.roster.length>0 && ['game','ended'].includes(state.screen);
  const players = state.roster.map(r=>{
    const showRole = over ? true
      : (!r.alive && (reveal==='open' || (reveal==='voting' && r.deathCause==='vote')));
    return { player:r.player, alive:r.alive,
             role: showRole? r.name : null,
             faction: showRole? r.faction : null,
             cause: r.alive? null : (r.deathCause||'out') };
  });
  const dEv = state.dayEventByRound[state.round];
  return {
    type:'state', started,
    phase:state.phase, roundRoman:roman(state.round),
    revealMode:reveal, terroristMode:state.terroristMode,
    players, timeline:buildAndonTimeline(), bomb:bombStatus(),
    dayEvent: (state.phase==='day' && dEv) ? {title:dEv.title, text:dEv.text} : null,
    nightEvent: lastNightEvent(),
    clue: (state.phase==='night' && state.liveClue) ? state.liveClue : null,
    gameOver:over, endTitle:state.endTitle||'', endTone:state.endTone||'', endSub:state.endSub||''
  };
}
function openAndon(){
  window.open(location.pathname+'?view=andon', 'sherlockAndon', 'width=1280,height=800');
}
function setRevealMode(m){ state.revealMode=m; render(); }
function setTerroristMode(m){ state.terroristMode=m; render(); }

/* ---- Andon side (runs only in the player window) ---- */
function causeLabel(c){
  return c==='vote'?'condemned by the city'
       : c==='night'?'fell in the night'
       : c==='surrender'?'surrendered'
       : c==='manual'?'out of the game':'out';
}
function bootAndon(){
  document.documentElement.classList.add('is-andon');
  let ch=null, got=false;
  try{ ch=new BroadcastChannel('sherlock-andon'); }catch(e){}
  if(ch){
    ch.onmessage=(e)=>{ if(e.data && e.data.type==='state'){ got=true; renderAndon(e.data); } };
    ch.postMessage({type:'hello'});
    let tries=0; const iv=setInterval(()=>{ if(got||tries++>30){clearInterval(iv);return;} ch.postMessage({type:'hello'}); }, 500);
  }
  renderAndon(null);
}
function renderAndon(snap){
  const app=$('#app'); if(!app) return;
  if(!snap || !snap.started){
    app.innerHTML = `<div class="andon-wait">
      <div class="andon-crest">Baker Street · Case Files</div>
      <h1 class="andon-h1">Sherlock in the City</h1>
      <p class="andon-wait-note">Waiting for the host to open the case…</p>
    </div>`;
    return;
  }
  const bomb=snap.bomb;
  const bombHtml = bomb.state==='safe' ? `<div class="andon-bomb safe">🕊 ${esc(bomb.text)}</div>`
    : bomb.state==='ticking' ? `<div class="andon-bomb ticking">💣 ${esc(bomb.text)}</div>` : '';
  const chips = snap.timeline.map(c=>`<span class="andon-chip ${c.kind} ${c.current?'current':''}">${c.ic} ${esc(c.label)}</span>`).join('');

  let cue;
  if(snap.phase==='day'){
    cue = snap.dayEvent
      ? `<div class="andon-card day"><div class="andon-card-k">Today's event</div><div class="andon-card-t">${esc(snap.dayEvent.title)}</div><div class="andon-card-x">${esc(snap.dayEvent.text)}</div></div>`
      : `<div class="andon-card day muted"><div class="andon-card-t">An ordinary day</div><div class="andon-card-x">No special event in force.</div></div>`;
  } else {
    cue = snap.clue
      ? `<div class="andon-clue"><div class="andon-card-k">A clue for Sherlock</div><div class="andon-clue-t">${esc(snap.clue)}</div></div>`
      : `<div class="andon-card night muted"><div class="andon-card-t">Night falls over London</div><div class="andon-card-x">Eyes closed. The city sleeps.</div></div>`;
  }
  const nEv = snap.nightEvent
    ? `<div class="andon-card mini"><div class="andon-card-k">Last night's event</div><div class="andon-card-t small">${esc(snap.nightEvent.title)}</div><div class="andon-card-x">${esc(snap.nightEvent.text)}</div></div>` : '';

  const pcards = snap.players.map(p=>{
    const role = p.role
      ? `<div class="andon-p-role ${p.faction}">${esc(p.role)}</div>`
      : (p.alive ? '' : `<div class="andon-p-role hidden">role hidden</div>`);
    const cause = (!p.alive && p.cause) ? `<div class="andon-p-cause">${esc(causeLabel(p.cause))}</div>` : '';
    return `<div class="andon-p ${p.alive?'alive':'dead'}"><div class="andon-p-name">${esc(p.player)}</div>${role}${cause}</div>`;
  }).join('');

  const verdict = snap.gameOver
    ? `<div class="andon-verdict"><div class="andon-verdict-k">Case closed</div><div class="andon-verdict-t ${esc(snap.endTone)}">${esc(snap.endTitle)}</div><div class="andon-verdict-x">${esc(snap.endSub)}</div></div>` : '';

  app.innerHTML = `
    <div class="andon">
      <div class="andon-top">
        <div class="andon-phase ${snap.phase}">${snap.phase==='night'?'☾ Night':'☀ Day'} ${esc(snap.roundRoman)}</div>
        ${bombHtml}
      </div>
      <div class="andon-timeline">${chips}</div>
      <div class="andon-stage">
        <div class="andon-cue">${cue}${nEv}</div>
        <div class="andon-players">${pcards}</div>
      </div>
      ${verdict}
    </div>`;
}

/* ---- boot: console or player screen ---- */
if(new URLSearchParams(location.search).get('view')==='andon'){
  bootAndon();
} else {
  try{
    andonChannel=new BroadcastChannel('sherlock-andon');
    andonChannel.onmessage=(e)=>{ if(e.data && e.data.type==='hello') broadcastAndon(); };
  }catch(e){ andonChannel=null; }
  state=freshState();
  render();
}
</script>
</body>
</html>
